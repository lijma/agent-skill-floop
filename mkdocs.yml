site_name: floop
site_url: https://lijma.github.io/agent-skill-floop/
site_description: AI prototypes degrade with every iteration. floop is the missing quality loop that keeps your Agent honest. An open-source alternative to Figma Make and Google Stitch.
site_author: Marvin Li
repo_url: https://github.com/lijma/agent-skill-floop
repo_name: lijma/floop

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mermaid-zoom

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_div_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/lijma/agent-skill-floop
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/floop/

extra_javascript:
  - assets/javascripts/mermaid.min.js

nav:
  - Home:
      - Overview: index.md
      - Getting Started: getting-started.md
      - Features: features.md
  - Use Cases: use-cases.md
  - Reference:
      - Commands: commands.md
      - Architecture: architecture.md
  - Contributing: contributing.md
